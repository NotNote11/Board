<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Syne+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --chrome: #141414; --chrome2: #1e1e1e; --chrome-border: #2a2a2a;
      --chrome-text: #888; --chrome-text-hi: #d0d0d0; --accent: #e8e0d4; --btn-hover: #272727;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--chrome); font-family: 'Syne', sans-serif; }
    #app { display: flex; height: 100vh; width: 100vw; }

    #sidebar {
      width: 54px; height: 100%; background: var(--chrome);
      border-right: 1px solid var(--chrome-border);
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 0; gap: 2px; flex-shrink: 0; z-index: 10;
    }
    .logo { font-family: 'Syne Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; margin-bottom: 20px; user-select: none; }
    .sep { width: 24px; height: 1px; background: var(--chrome-border); margin: 8px 0; flex-shrink: 0; }
    .spacer { flex: 1; }
    .tip-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .tip-wrap::after {
      content: attr(data-tip); position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
      background: var(--chrome2); border: 1px solid var(--chrome-border); color: var(--chrome-text-hi);
      font-family: 'Syne', sans-serif; font-size: 10px; white-space: nowrap; padding: 4px 10px;
      border-radius: 6px; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 999; font-weight: 500;
    }
    .tip-wrap:hover::after { opacity: 1; }
    .btn {
      width: 36px; height: 36px; border-radius: 8px; border: none; background: transparent;
      color: var(--chrome-text); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s; flex-shrink: 0;
    }
    .btn svg { width: 15px; height: 15px; stroke-width: 1.8; }
    .btn:hover { background: var(--btn-hover); color: var(--chrome-text-hi); }
    .btn.on { background: var(--accent); color: #141414; }
    .btn.danger { color: #a05050; }
    .btn.danger:hover { background: rgba(180,80,80,.12); color: #e07070; }

    #board-wrap { flex: 1; height: 100%; position: relative; overflow: hidden; display: flex; }
    #canvas-area { flex: 1; height: 100%; position: relative; overflow: hidden; }
    #bc { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; display: block; cursor: crosshair; }
    #bc.eraser { cursor: cell; }

    #strip {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(16,16,16,0.96); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--chrome-border); border-radius: 16px;
      display: flex; align-items: center; padding: 0 14px; gap: 10px;
      z-index: 20; height: 50px; box-shadow: 0 8px 40px rgba(0,0,0,.7); white-space: nowrap;
    }
    .slabel { font-size: 9px; color: #444; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; font-family: 'Syne Mono', monospace; }
    .ssep { width: 1px; height: 24px; background: var(--chrome-border); flex-shrink: 0; }

    .bg-toggle { display: flex; gap: 5px; align-items: center; }
    .bg-opt { width: 26px; height: 26px; border-radius: 7px; border: 2.5px solid transparent; cursor: pointer; transition: transform .13s, border-color .13s; flex-shrink: 0; }
    .bg-opt:hover { transform: scale(1.12); }
    .bg-opt.on { border-color: #e8e0d4; }
    #bg-white { background: #f8f7f4; }
    #bg-black { background: #111110; box-shadow: inset 0 0 0 1px #3a3a3a; }

    .color-row { display: flex; gap: 5px; align-items: center; }
    .cd { width: 19px; height: 19px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: transform .13s, border-color .13s; flex-shrink: 0; }
    .cd:hover { transform: scale(1.2); }
    .cd.on { border-color: #e8e0d4; }

    .size-row { display: flex; gap: 7px; align-items: center; }
    .sz-dot { border-radius: 50%; background: #666; cursor: pointer; transition: background .13s; flex-shrink: 0; outline: 2px solid transparent; outline-offset: 2px; }
    .sz-dot:hover { background: var(--chrome-text-hi); }
    .sz-dot.on { background: var(--chrome-text-hi); outline-color: var(--accent); }

    #yt-panel { width: 0; height: 100%; background: var(--chrome2); border-left: 1px solid var(--chrome-border); display: flex; flex-direction: column; overflow: hidden; transition: width .3s ease; flex-shrink: 0; }
    #yt-panel.open { width: 380px; }
    .yt-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--chrome-border); flex-shrink: 0; }
    .yt-title { font-size: 11px; font-weight: 600; color: var(--chrome-text-hi); letter-spacing: .1em; text-transform: uppercase; font-family: 'Syne Mono', monospace; }
    .yt-close { width: 26px; height: 26px; border-radius: 6px; border: none; background: transparent; color: var(--chrome-text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .12s, color .12s; }
    .yt-close:hover { background: var(--btn-hover); color: var(--chrome-text-hi); }
    .yt-close svg { width: 14px; height: 14px; }
    .yt-body { flex: 1; display: flex; flex-direction: column; padding: 18px; gap: 14px; min-width: 380px; overflow-y: auto; }
    .yt-input-row { display: flex; gap: 8px; }
    #yt-url { flex: 1; background: #111; border: 1px solid var(--chrome-border); border-radius: 8px; color: var(--chrome-text-hi); font-family: 'Syne', sans-serif; font-size: 12px; padding: 9px 12px; outline: none; transition: border-color .15s; }
    #yt-url::placeholder { color: #444; }
    #yt-url:focus { border-color: #444; }
    #yt-load { padding: 0 14px; border-radius: 8px; border: none; background: var(--accent); color: #141414; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: .05em; text-transform: uppercase; transition: opacity .12s; white-space: nowrap; }
    #yt-load:hover { opacity: .8; }
    #yt-embed-wrap { position: relative; width: 100%; padding-top: 56.25%; border-radius: 10px; overflow: hidden; background: #0a0a0a; border: 1px solid var(--chrome-border); }
    #yt-embed-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .yt-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .yt-placeholder svg { width: 36px; height: 36px; stroke: #2a2a2a; }
    .yt-placeholder-text { font-size: 11px; color: #333; text-align: center; font-family: 'Syne Mono', monospace; line-height: 1.6; }

    #notif { position: absolute; bottom: 74px; right: 14px; z-index: 999; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; pointer-events: none; }
    .nitem { background: var(--chrome2); border: 1px solid var(--chrome-border); color: var(--chrome-text-hi); font-size: 11px; font-family: 'Syne Mono', monospace; padding: 6px 12px; border-radius: 8px; animation: nfade 2.2s ease forwards; }
    @keyframes nfade { 0%{opacity:0;transform:translateY(4px)} 15%{opacity:1;transform:translateY(0)} 75%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="logo">B.</div>
    <div class="tip-wrap" data-tip="Pen  P"><button class="btn on" id="t-pen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z"/></svg></button></div>
    <div class="tip-wrap" data-tip="Eraser  E"><button class="btn" id="t-eraser"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16 13 6l7 7-1.5 1.5"/><path d="M6 10l8 8"/></svg></button></div>
    <div class="sep"></div>
    <div class="tip-wrap" data-tip="YouTube"><button class="btn" id="t-yt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42A2.78 2.78 0 0020.63 4.5C18.88 4 12 4 12 4s-6.88 0-8.63.5A2.78 2.78 0 001.46 6.42 29.94 29.94 0 001 12a29.94 29.94 0 00.46 5.58 2.78 2.78 0 001.91 1.92C5.12 20 12 20 12 20s6.88 0 8.63-.5a2.78 2.78 0 001.91-1.92A29.94 29.94 0 0023 12a29.94 29.94 0 00-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg></button></div>
    <div class="spacer"></div>
    <div class="sep"></div>
    <div class="tip-wrap" data-tip="Undo  Ctrl+Z"><button class="btn" id="t-undo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg></button></div>
    <div class="tip-wrap" data-tip="Redo  Ctrl+Y"><button class="btn" id="t-redo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg></button></div>
    <div class="tip-wrap" data-tip="Clear  Del"><button class="btn danger" id="t-clear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg></button></div>
  </div>

  <div id="board-wrap">
    <div id="canvas-area">
      <canvas id="bc"></canvas>
      <div id="strip">
        <span class="slabel">Board</span>
        <div class="bg-toggle">
          <div class="bg-opt on" id="bg-white" data-bg="#f8f7f4" title="Whiteboard"></div>
          <div class="bg-opt"    id="bg-black" data-bg="#111110" title="Blackboard"></div>
        </div>
        <div class="ssep"></div>
        <span class="slabel">Color</span>
        <div class="color-row" id="color-row"></div>
        <div class="ssep"></div>
        <span class="slabel">Size</span>
        <div class="size-row">
          <div class="sz-dot on" data-sz="2"  style="width:5px;height:5px;"></div>
          <div class="sz-dot"    data-sz="5"  style="width:9px;height:9px;"></div>
          <div class="sz-dot"    data-sz="12" style="width:14px;height:14px;"></div>
          <div class="sz-dot"    data-sz="24" style="width:20px;height:20px;"></div>
        </div>
      </div>
      <div id="notif"></div>
    </div>

    <div id="yt-panel">
      <div class="yt-header">
        <span class="yt-title">YouTube</span>
        <button class="yt-close" id="yt-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="yt-body">
        <div class="yt-input-row">
          <input type="text" id="yt-url" placeholder="Paste YouTube URL..." />
          <button id="yt-load">Load</button>
        </div>
        <div id="yt-embed-wrap">
          <div class="yt-placeholder" id="yt-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42A2.78 2.78 0 0020.63 4.5C18.88 4 12 4 12 4s-6.88 0-8.63.5A2.78 2.78 0 001.46 6.42 29.94 29.94 0 001 12a29.94 29.94 0 00.46 5.58 2.78 2.78 0 001.91 1.92C5.12 20 12 20 12 20s6.88 0 8.63-.5a2.78 2.78 0 001.91-1.92A29.94 29.94 0 0023 12a29.94 29.94 0 00-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>
            <span class="yt-placeholder-text">Paste a YouTube link<br>and press Load</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('bc');
  const ctx = canvas.getContext('2d');
  const canvasArea = document.getElementById('canvas-area');

  let tool = 'pen', sz = 2, boardBg = '#f8f7f4', inkColor = '#1a1a1a';
  let drawing = false, lx = 0, ly = 0, pts = [];
  let hist = [], hidx = -1;

  const COLORS = ['#1a1a1a','#ffffff','#e05252','#e8943a','#d4b84a','#4caf7d','#4a90d9','#9b6dd4','#e07bb5'];

  function buildColors() {
    const row = document.getElementById('color-row');
    row.innerHTML = '';
    COLORS.forEach(hex => {
      const d = document.createElement('div');
      d.className = 'cd' + (hex === inkColor ? ' on' : '');
      d.style.background = hex;
      if (hex === '#ffffff') d.style.boxShadow = 'inset 0 0 0 1px #555';
      d.onclick = () => { inkColor = hex; buildColors(); };
      row.appendChild(d);
    });
  }
  buildColors();

  function resize() {
    const d = canvas.width > 0 && canvas.height > 0 ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
    canvas.width = canvasArea.clientWidth;
    canvas.height = canvasArea.clientHeight;
    canvas.style.background = boardBg;
    if (d) ctx.putImageData(d, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function saveSnap() {
    const d = canvas.toDataURL();
    hist = hist.slice(0, hidx + 1); hist.push(d);
    if (hist.length > 60) hist.shift(); else hidx++;
  }
  function loadImg(src) {
    const img = new Image();
    img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
    img.src = src;
  }
  function undo() { if (hidx <= 0) return notify('Nothing to undo'); hidx--; loadImg(hist[hidx]); notify('Undo'); }
  function redo() { if (hidx >= hist.length - 1) return notify('Nothing to redo'); hidx++; loadImg(hist[hidx]); notify('Redo'); }
  saveSnap();

  function notify(m) {
    const el = document.createElement('div'); el.className = 'nitem'; el.textContent = m;
    document.getElementById('notif').appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }

  function gp(e) {
    const r = canvas.getBoundingClientRect(), s = e.touches ? e.touches[0] : e;
    return { x: s.clientX - r.left, y: s.clientY - r.top };
  }

  function startD(e) {
    const {x, y} = gp(e);
    drawing = true; lx = x; ly = y; pts = [{x, y}];
    if (tool === 'pen') {
      ctx.save(); ctx.beginPath(); ctx.arc(x, y, sz/2, 0, Math.PI*2);
      ctx.fillStyle = inkColor; ctx.fill(); ctx.restore();
    }
  }
  function moveD(e) {
    if (!drawing) return;
    const {x, y} = gp(e); pts.push({x, y});
    ctx.save();
    if (tool === 'pen') {
      ctx.strokeStyle = inkColor; ctx.lineWidth = sz; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      if (pts.length > 2) {
        const p = pts, i = p.length - 1;
        ctx.moveTo((p[i-2].x+p[i-1].x)/2, (p[i-2].y+p[i-1].y)/2);
        ctx.quadraticCurveTo(p[i-1].x, p[i-1].y, (p[i-1].x+p[i].x)/2, (p[i-1].y+p[i].y)/2);
      } else { ctx.moveTo(lx, ly); ctx.lineTo(x, y); }
      ctx.stroke();
    } else if (tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth = sz*4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(x, y); ctx.stroke();
    }
    ctx.restore(); lx = x; ly = y;
  }
  function endD() { if (!drawing) return; drawing = false; pts = []; saveSnap(); }

  canvas.addEventListener('mousedown', startD);
  canvas.addEventListener('mousemove', moveD);
  canvas.addEventListener('mouseup', endD);
  canvas.addEventListener('mouseleave', endD);
  canvas.addEventListener('touchstart', e=>{e.preventDefault();startD(e);},{passive:false});
  canvas.addEventListener('touchmove', e=>{e.preventDefault();moveD(e);},{passive:false});
  canvas.addEventListener('touchend', e=>{e.preventDefault();endD();},{passive:false});

  function selTool(t) {
    tool = t;
    document.getElementById('t-pen').classList.toggle('on', t==='pen');
    document.getElementById('t-eraser').classList.toggle('on', t==='eraser');
    canvas.className = t==='eraser' ? 'eraser' : '';
  }
  document.getElementById('t-pen').onclick = () => selTool('pen');
  document.getElementById('t-eraser').onclick = () => selTool('eraser');

  document.querySelectorAll('.bg-opt').forEach(opt => {
    opt.onclick = () => {
      document.querySelectorAll('.bg-opt').forEach(o => o.classList.remove('on'));
      opt.classList.add('on'); boardBg = opt.dataset.bg; canvas.style.background = boardBg;
      notify(boardBg === '#111110' ? 'Blackboard' : 'Whiteboard');
    };
  });

  document.querySelectorAll('.sz-dot').forEach(d => {
    d.onclick = () => {
      document.querySelectorAll('.sz-dot').forEach(x => x.classList.remove('on'));
      d.classList.add('on'); sz = parseInt(d.dataset.sz);
    };
  });

  document.getElementById('t-clear').onclick = () => { ctx.clearRect(0,0,canvas.width,canvas.height); saveSnap(); notify('Cleared'); };
  document.getElementById('t-undo').onclick = undo;
  document.getElementById('t-redo').onclick = redo;

  document.addEventListener('keydown', e => {
    if (e.target.tagName==='TEXTAREA' || e.target.tagName==='INPUT') return;
    const k = e.key.toLowerCase();
    if ((e.ctrlKey||e.metaKey) && k==='z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
    if ((e.ctrlKey||e.metaKey) && (k==='y'||(k==='z'&&e.shiftKey))) { e.preventDefault(); redo(); return; }
    if (k==='p') selTool('pen');
    if (k==='e') selTool('eraser');
    if (k==='delete'||k==='backspace') document.getElementById('t-clear').click();
  });

  const ytPanel = document.getElementById('yt-panel');
  const ytBtn = document.getElementById('t-yt');
  function toggleYT(open) { ytPanel.classList.toggle('open', open); ytBtn.classList.toggle('on', open); }
  ytBtn.onclick = () => toggleYT(!ytPanel.classList.contains('open'));
  document.getElementById('yt-close').onclick = () => toggleYT(false);

  function extractYTId(url) {
    const pats = [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/];
    for (const p of pats) { const m = url.match(p); if (m) return m[1]; }
    return null;
  }
  function loadYT() {
    const url = document.getElementById('yt-url').value.trim();
    const id = extractYTId(url);
    if (!id) { notify('Invalid YouTube URL'); return; }
    const wrap = document.getElementById('yt-embed-wrap');
    document.getElementById('yt-placeholder').style.display = 'none';
    const old = wrap.querySelector('iframe'); if (old) old.remove();
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    wrap.appendChild(iframe);
  }
  document.getElementById('yt-load').onclick = loadYT;
  document.getElementById('yt-url').addEventListener('keydown', e => { if (e.key==='Enter') loadYT(); });
</script>
</body>
</html>
